[package]
name        = "clauders"
description = "Unofficial Rust SDK for the Anthropic Claude Messages API."
version     = "0.1.0"
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
publish.workspace      = true
readme      = "README.md"
keywords    = ["claude", "anthropic", "llm", "sdk", "ai"]
categories  = ["api-bindings", "web-programming::http-client", "asynchronous"]

[lints]
workspace = true

[features]
# Gates `cache_control` fields on request types and cache-hit counters
# on `Usage` responses. Off by default to keep the wire payload minimal
# for callers that don't use prompt caching.
messages-caching = []

[dependencies]
serde      = { workspace = true }
serde_json = { workspace = true }
thiserror  = { workspace = true }
secrecy    = { workspace = true }
tracing    = { workspace = true }
url        = { workspace = true }
http       = { workspace = true }

[dev-dependencies]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
